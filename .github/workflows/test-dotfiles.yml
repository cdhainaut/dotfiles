name: Test dotfiles deployment
on:
  push:
  pull_request:
jobs:
  docker-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build test Docker image
        run: docker build -t chezmoi-test .

      - name: Apply chezmoi and run tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/tmp/dotfiles-src:ro" \
            chezmoi-test bash -c '
              set -eu
              export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$HOME/miniconda/bin:$PATH"

              # Apply from mounted local repo (faster, no extra git clone)
              chezmoi init --apply --source /tmp/dotfiles-src

              # Load nvm if installed
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true

              # Run test suite
              bash /tmp/dotfiles-src/test_install.sh

              # LSP health check (informational, non-blocking)
              echo "=== Helix LSP health ==="
              hx --health python 2>&1 | head -5 || true
              hx --health cpp 2>&1 | head -5 || true
            '
