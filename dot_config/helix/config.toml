theme = "dark_plus"
# theme = "kanagawa"
# theme = "catppuccin_macchiato"
# theme = "dark_plus"
[editor]
bufferline="always"
# Diagnostics: on désactive tout le texte inline (end-of-line + blocs multi-lignes).
# Les soulignements et marqueurs gouttière restent actifs.
# Détails visibles via Space+d (picker) ou ]d/[d (navigation).
end-of-line-diagnostics = "disable"

[editor.inline-diagnostics]
cursor-line = "disable"
other-lines = "disable"


[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[keys.normal]
"(" = "goto_prev_paragraph"
")" = "goto_next_paragraph"
"G" = "goto_file_end"
"0" = "goto_line_start"
"V" = ["goto_line_start","select_mode"]
"C-h" = "jump_view_left"
"C-l" = "jump_view_right"
"C-k" = "jump_view_up"
"C-j" = "jump_view_down"
# "C-q" = ":buffer-close"
# "<space>q" = ":buffer-close"
g = { a = "code_action" } # Maps `ga` to show possible code actions

C-g = [
    # ":write-all",
    ":new",
    ":insert-output lazygit",
    ":buffer-close!",
    ":redraw",
    ":reload-all"
]

C-y = [
    ":sh rm -f /tmp/yazi-pick",
    ":insert-output yazi '%{buffer_name}' --chooser-file=/tmp/yazi-pick",
    ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
    ":open %sh{cat /tmp/yazi-pick}",
    ":redraw",
]

[keys.normal.space]
"q" = ":buffer-close"

[keys.select]
"(" = "goto_prev_paragraph"
")" = "goto_next_paragraph"
"G" = "goto_file_end"
"0" = "goto_line_start"
"C-h" = "jump_view_left"
"C-l" = "jump_view_right"
"C-k" = "jump_view_up"
"C-j" = "jump_view_down"

