# ~/.config/helix/languages.toml

# ── Language servers ──────────────────────────────────────────────

[language-server.helix-assist]
command = "helix-assist"
args = ["--handler", "anthropic", "--num-suggestions", "2"]

# helix-gpt supprimé: archivé janv. 2026, remplacé par helix-assist

[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]

# Pyright: mode "basic" pour matcher le comportement de Pylance (VS Code).
# "standard" (défaut pyright) est trop strict pour du prototypage.
# Les reportXxx = "none" désactivent les erreurs de types trop verbeuses.
[language-server.pyright.config]
typeCheckingMode = "basic"
autoSearchPaths = true
useLibraryCodeForTypes = true
reportMissingTypeStubs = "none"
reportMissingModuleSource = "none"
reportUnknownParameterType = "none"
reportUnknownArgumentType = "none"
reportUnknownVariableType = "none"
reportUnknownMemberType = "none"
reportUnknownLambdaType = "none"
reportUntypedFunctionDecorator = "none"
reportPrivateUsage = "none"
reportAttributeAccessIssue = "none"
reportOptionalMemberAccess = "warning"
reportOptionalSubscript = "warning"
reportOptionalCall = "warning"

[language-server.ruff]
command = "ruff"
args = ["server"]

[language-server.wakatime]
command = "wakatime-ls"

[language-server.clangd]
command = "clangd"
args = ["--background-index", "--clang-tidy"]

# ── Languages ─────────────────────────────────────────────────────

[[language]]
name = "python"
language-servers = [
  "pyright",
  { name = "ruff", only-features = ["format", "diagnostics", "code-action"] },
  "helix-assist",
  "wakatime",
]
auto-format = true

[[language]]
name = "cpp"
auto-format = true
formatter = { command = "clang-format" }
language-servers = ["clangd", "helix-assist"]

[[language]]
name = "markdown"
language-servers = ["helix-assist", "wakatime"]
auto-format = true
soft-wrap.enable = true

[[language]]
name = "yaml"
file-types = ["yaml", "yml"]
language-servers = ["helix-assist", "wakatime"]
formatter = { command = "yamlfmt", args = ["-"] }
auto-format = true

[[language]]
name = "javascript"
file-types = ["js", "cjs", "mjs", "bic", "boc"]
language-servers = ["helix-assist", "wakatime"]

[[language]]
name = "toml"
auto-format = true

[[language]]
name = "json"
auto-format = true

[[language]]
name = "bash"
auto-format = true
formatter = { command = "shfmt", args = ["-i", "2", "-"] }
