name: Test dotfiles deployment
on:
  push:
  pull_request:
jobs:
  docker-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Build test Docker image
        run: docker build -t chezmoi-test .
      - name: Run container and apply chezmoi
        run: |
          docker run --rm chezmoi-test bash -lc '
            set -eu
            export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"

            # Install and apply chezmoi
            sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
            chezmoi init --apply github.com/${{ github.repository }}

            # Run test suite
            bash "$HOME/.local/share/chezmoi/test_install.sh"
          '
